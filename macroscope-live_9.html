// ██  FETCH ENGINE  ██
// ═══════════════════════════════════════════════════════════════════════════════

// Cache in-memory so refresh doesn't re-fetch every series on every tab switch
const _cache = {};

// These functions read keys from window._FRED_KEY / window._NASDAQ_KEY at call time,
// so runtime key entry (via the setup banner) works without a page reload.
// CORS proxy list — tried in order, falls back if one is down
// These proxies accept null origin (local file://)
const CORS_PROXIES = [
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];

async function fetchWithCorsProxy(targetUrl) {
  let lastErr;
  for (const makeProxy of CORS_PROXIES) {
    try {
      const res = await fetch(makeProxy(targetUrl));
      if (res.ok) return res;
      lastErr = new Error(`HTTP ${res.status}`);
    } catch(e) { lastErr = e; }
  }
  // Last resort: try direct (works if FRED ever adds CORS headers)
  try {
    const res = await fetch(targetUrl);
    if (res.ok) return res;
  } catch(e) {}
  throw lastErr;
}

async function fetchFredSeries(seriesId, count = 104) {
  const apiKey = window._FRED_KEY || FRED_API_KEY;
  const cacheKey = `fred_${seriesId}_${apiKey.slice(0,6)}`;
  if (_cache[cacheKey]) return _cache[cacheKey];
  const targetUrl = `https://api.stlouisfed.org/fred/series/observations` +
    `?series_id=${seriesId}&api_key=${apiKey}&file_type=json` +
    `&sort_order=desc&limit=${count}`;
  const res = await fetchWithCorsProxy(targetUrl);
  if (!res.ok) throw new Error(`FRED ${seriesId}: HTTP ${res.status}`);
  const json = await res.json();
  if (json.error_message) throw new Error(`FRED ${seriesId}: ${json.error_message}`);
  const obs = json.observations
    .filter(o => o.value !== "." && o.value !== "")
    .reverse()
    .map(o => ({ date: o.date, value: parseFloat(o.value) }));
  _cache[cacheKey] = obs;
  return obs;
}

async function fetchNasdaqSeries(datasetCode, count = 52) {
  const apiKey = window._NASDAQ_KEY || NASDAQ_API_KEY;
  const cacheKey = `nasdaq_${datasetCode}_${apiKey.slice(0,6)}`;
  if (_cache[cacheKey]) return _cache[cacheKey];
  const url = `https://data.nasdaq.com/api/v3/datasets/${datasetCode}.json` +
    `?api_key=${apiKey}&rows=${count}&order=asc`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Nasdaq ${datasetCode}: HTTP ${res.status}`);
  const json = await res.json();
  const obs = json.dataset.data
    .map(row => ({ date: row[0], value: parseFloat(row[1]) }))
    .filter(o => !isNaN(o.value));
  _cache[cacheKey] = obs;
  return obs;
}

// Compute YoY % change using the last value vs the value ~52 obs ago
function calcYoY(obs) {
  if (obs.length < 2) return null;
  const now = obs[obs.length - 1].value;
  const prior = obs[0].value;
  return ((now - prior) / Math.abs(prior)) * 100;
}

// Format a raw number given a series spec
function formatValue(raw, spec) {
  if (raw == null || isNaN(raw)) return "—";
  let v = raw;
  if (spec.multBps) v = raw * 100; // yield curve: decimal → bps
  v = v / (spec.div === 1 ? 1 : 1); // div already applied upstream
  if (spec.fmt === "$T") return `$${(raw / 1e6).toFixed(spec.decimals)}T`;
  if (spec.fmt === "$B") return `$${(raw / 1e3).toFixed(spec.decimals)}B`;
  if (spec.fmt === "K")  return `${(raw / 1e3).toFixed(spec.decimals)}K`;
  if (spec.fmt === "bps" && spec.multBps) return `${Math.round(raw * 100)} bps`;
  if (spec.fmt === "bps") return `${raw.toFixed(spec.decimals)} bps`;
  if (spec.fmt === "%")  return `${raw.toFixed(spec.decimals)}%`;
  return raw.toFixed(spec.decimals);
}

// ██  SPARKLINE (unchanged from original)  ██
// ═══════════════════════════════════════════════════════════════════════════════
function Sparkline({ data, color, labels }) {
  const [tipIdx, setTipIdx] = useState(null);
  const W = 260, H = 56;
  const mL = 38, mR = 8, mT = 6, mB = 18;
  const cW = W - mL - mR, cH = H - mT - mB;
  const mn = Math.min(...data), mx = Math.max(...data);
  const rng = mx - mn || 1;
  const fmt = v => {
    const abs = Math.abs(v);
    if (abs >= 1000) return (v/1000).toFixed(1).replace(/\.0$/,"")+"k";
    if (abs >= 1)    return Number.isInteger(v) ? String(v) : v.toFixed(1);
    return v.toFixed(2);
  };
  const xOf = i => mL + (i / (data.length - 1)) * cW;
  const yOf = v => mT + cH - ((v - mn) / rng) * cH;
  const pts = data.map((v,i) => [xOf(i), yOf(v)]);
  const linePath = pts.map((p,i) => `${i===0?"M":"L"}${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(" ");
  const areaPath = `${linePath} L${pts[pts.length-1][0].toFixed(1)} ${mT+cH} L${mL} ${mT+cH} Z`;
  const yGridVals = [mn, (mn+mx)/2, mx];
  const uid = `sp_${color.replace(/[^a-z0-9]/gi,"")}_${Math.round(mn*10+mx*7)}`;
  const xLabelIdxs = [0, Math.floor((data.length-1)/2), data.length-1];
  const hitW = cW / (data.length - 1);
  const tip = tipIdx != null ? { x: pts[tipIdx][0], y: pts[tipIdx][1], v: data[tipIdx], i: tipIdx } : null;
  return (
    <div className="sparkline">
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" onMouseLeave={() => setTipIdx(null)}>
        <defs>
          <linearGradient id={uid} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
            <stop offset="100%" stopColor={color} stopOpacity="0"/>
          </linearGradient>
        </defs>
        {yGridVals.map((v,i) => {
          const y = yOf(v);
          return (
            <g key={i}>
              <line x1={mL} x2={mL+cW} y1={y} y2={y} stroke="#1e2a42" strokeWidth={i===0?1.2:0.7} strokeDasharray={i===0?"":"3 3"}/>
              <text x={mL-3} y={y+3.5} textAnchor="end" fill="#4a5568" fontSize="8.5" fontFamily="'Share Tech Mono',monospace">{fmt(v)}</text>
            </g>
          );
        })}
        <path d={areaPath} fill={`url(#${uid})`} clipPath={`url(#clip_${uid})`}/>
        <clipPath id={`clip_${uid}`}><rect x={mL} y={mT} width={cW} height={cH}/></clipPath>
        <path d={linePath} stroke={color} strokeWidth="1.5" fill="none"/>
        {xLabelIdxs.map(i => {
          const lbl = labels ? labels[i] : `p${i+1}`;
          const x = xOf(i);
          const anchor = i===0 ? "start" : i===data.length-1 ? "end" : "middle";
          const cx = i===0 ? mL : i===data.length-1 ? mL+cW : x;
          return <text key={i} x={cx} y={H-2} textAnchor={anchor} fill="#4a5568" fontSize="8.5" fontFamily="'Share Tech Mono',monospace">{lbl}</text>;
        })}
        {data.map((v,i) => {
          const x = xOf(i) - hitW/2;
          return <rect key={i} x={x} y={mT} width={hitW} height={cH} fill="transparent" onMouseEnter={() => setTipIdx(i)}/>;
        })}
        {tip && (
          <g>
            <line x1={tip.x} x2={tip.x} y1={mT} y2={mT+cH} stroke={color} strokeWidth="0.8" strokeDasharray="3 2" opacity="0.5"/>
            <circle cx={tip.x} cy={tip.y} r="3" fill={color} stroke="#060810" strokeWidth="1.5"/>
            {(() => {
              const tw = 60, th = 20;
              const tx = tip.x + 6 + tw > W ? tip.x - tw - 6 : tip.x + 6;
              const ty = Math.max(mT+2, tip.y - 10);
              return (
                <g>
                  <rect x={tx} y={ty} width={tw} height={th} rx="3" fill="#0d1120" stroke="#1e2a42" strokeWidth="1"/>
                  <text x={tx+5} y={ty+13} fill={color} fontSize="9.5" fontFamily="'Share Tech Mono',monospace">{fmt(tip.v)}</text>
                </g>
              );
            })()}
          </g>
        )}
        {!tip && <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="2.5" fill={color}/>}
      </svg>
    </div>
  );
}

// ██  MetricCard — live-aware  ██
// ═══════════════════════════════════════════════════════════════════════════════
function MetricCard({ name, value, unit="", change, changePeriod, signal, desc, source, sparkData, sparkLabels, isLive, isLoading, liveError }) {
  const sc = {bullish:"#22c55e",bearish:"#ef4444",neutral:"#f59e0b",watch:"#22d3ee"}[signal]||"#888";
  const chStr = String(change||"");
  const isUp = chStr.startsWith("+") || (typeof change==="number"&&change>0);
  const isDown = chStr.startsWith("-") || (typeof change==="number"&&change<0);
  const defaultLabels = sparkData ? sparkData.map((_,i,a) => {
    if (i===0) return `${a.length-1}m ago`;
    if (i===Math.floor((a.length-1)/2)) return "";
    if (i===a.length-1) return "now";
    return "";
  }) : null;
  const displaySignal = isLoading ? "loading" : signal;
  return (
    <div className={`card ${displaySignal}`}>
      <div className="card-header">
        <div className="card-name">
          {name}
          {isLive && !isLoading && !liveError && <span className="live-badge">LIVE</span>}
          {!isLive && <span className="manual-badge">MANUAL</span>}
        </div>
        <div className={`signal-badge ${displaySignal}`}>{isLoading ? "…" : signal}</div>
      </div>
      <div className={`card-value ${isLoading ? "loading" : ""}`}>
        {isLoading ? <span className="loading-shimmer"/> : liveError ? <span style={{fontSize:"13px",color:"var(--red)"}}>fetch error</span> : value}
        {!isLoading && !liveError && <span style={{fontSize:"13px",color:"var(--text-dim)",marginLeft:"4px"}}>{unit}</span>}
      </div>
      {change!=null&&!isLoading&&(
        <div className="card-change">
          <span className={isDown?"down":isUp?"up":"flat"}>{change}</span>
          {changePeriod&&<span className="lbl">{changePeriod}</span>}
        </div>
      )}
      {sparkData&&sparkData.length>1&&<Sparkline data={sparkData} color={sc} labels={sparkLabels||defaultLabels}/>}
      <div className="card-desc">{desc}</div>
      {source&&<div className="card-source">↗ {source}</div>}
    </div>
  );
}

// ██  SIGNAL INFERENCE  ██
// Given a series key and its live value, determine bullish/bearish/neutral/watch
// ═══════════════════════════════════════════════════════════════════════════════
function inferSignal(key, value, yoyVal) {
  if (value == null || isNaN(value)) return "neutral";
  switch(key) {
    case "FED_BALANCE":  return value < 7500 ? "bearish" : value > 8500 ? "bullish" : "neutral";
    case "RRP":          return value < 200 ? "neutral" : value > 500 ? "bullish" : "watch";
    case "TGA":          return value > 900 ? "bearish" : value < 400 ? "bullish" : "neutral";
    case "M2_YOY":       return yoyVal != null ? (yoyVal > 5 ? "bullish" : yoyVal > 0 ? "neutral" : "bearish") : "neutral";
    case "NFCI":         return value < -0.5 ? "bullish" : value > 0.3 ? "bearish" : "neutral";
    case "HY_SPREADS":   return value < 300 ? "bullish" : value > 500 ? "bearish" : "neutral";
    case "DXY":          return value < 100 ? "bullish" : value > 107 ? "bearish" : "neutral";
    case "CI_LOANS":     return yoyVal != null ? (yoyVal > 5 ? "bullish" : yoyVal > 0 ? "neutral" : "bearish") : "neutral";
    case "SOFR":         return value < 0.1 ? "bullish" : value > 0.2 ? "watch" : "neutral";
    case "YIELD_CURVE":  return value > 0 ? "watch" : value < -0.5 ? "bearish" : "neutral";
    case "JOBLESS":      return value < 215 ? "bullish" : value > 260 ? "bearish" : "neutral";
    case "NAHB":         return value > 55 ? "bullish" : value < 40 ? "bearish" : "neutral";
    case "MICH":         return value > 80 ? "bullish" : value < 65 ? "bearish" : "neutral";
    case "VIX":          return value < 15 ? "watch" : value > 30 ? "bearish" : value > 20 ? "neutral" : "bullish";
    case "MOODY_BAA":    return value < 5.2 ? "bullish" : value > 6.0 ? "bearish" : "neutral";
    case "NAAIM":        return value > 90 ? "bearish" : value < 40 ? "bullish" : value > 75 ? "neutral" : "bullish";
    default:             return "neutral";
  }
}

function buildDisplayValue(key, obs) {
  if (!obs || obs.length === 0) return { display:"—", change:null, signal:"neutral" };
  const spec = FRED_SERIES[key] || {};
  const latest = obs[obs.length - 1].value;
  const prev   = obs.length > 1 ? obs[obs.length - 2].value : null;

  let displayVal, yoyVal = null;

  if (spec.calcYoY) {
    yoyVal = calcYoY(obs);
    displayVal = yoyVal != null ? `${yoyVal > 0 ? "+" : ""}${yoyVal.toFixed(1)}%` : "—";
  } else if (spec.multBps) {
    displayVal = `${Math.round(latest * 100)} bps`;
  } else if (spec.fmt === "$T") {
    displayVal = `$${(latest / 1e6).toFixed(2)}T`;
  } else if (spec.fmt === "$B") {
    displayVal = `$${(latest / 1e3).toFixed(0)}B`;
  } else if (spec.fmt === "K") {
    displayVal = `${(latest / 1e3).toFixed(0)}K`;
  } else {
    displayVal = latest.toFixed(spec.decimals || 1);
  }

  let changeStr = null;
  if (prev != null) {
    const diff = latest - prev;
    const sign = diff >= 0 ? "+" : "";
    if (spec.multBps)    changeStr = `${sign}${Math.round(diff * 100)} bps`;
    else if (spec.fmt === "$T") changeStr = `${sign}${(diff / 1e6).toFixed(2)}T`;
    else if (spec.fmt === "$B") changeStr = `${sign}${(diff / 1e3).toFixed(0)}B`;
    else changeStr = `${sign}${diff.toFixed(spec.decimals || 1)}`;
  }

  // Build sparkline array from obs (up to 24 most recent)
  const sparkRaw = obs.slice(-24).map(o => {
    if (spec.multBps) return o.value * 100;
    if (spec.fmt === "$T") return o.value / 1e6;
    if (spec.fmt === "$B") return o.value / 1e3;
    if (spec.fmt === "K")  return o.value / 1e3;
    return o.value;
  });

  const sig = inferSignal(key, latest, yoyVal);

  return { display: displayVal, change: changeStr, signal: sig, sparkData: sparkRaw, latestDate: obs[obs.length-1].date };
}

// ██  GaugeCard / TrifectaPanel (unchanged structure)  ██
// ═══════════════════════════════════════════════════════════════════════════════
function GaugeCard({ title, value, pct, color, labels, desc, isLive, isLoading }) {
  const barColor = pct>80?"#ef4444":pct>60?"#f59e0b":pct>30?"#22c55e":"#3b82f6";
  return (
    <div className="gauge-card">
      <div className="gauge-title">
        {title}
        {isLive && !isLoading && <span className="live-badge" style={{marginLeft:"6px"}}>LIVE</span>}
        {!isLive && <span className="manual-badge" style={{marginLeft:"6px"}}>MANUAL</span>}
      </div>
      <div className="gauge-value-big" style={{color:barColor}}>
        {isLoading ? <span className="loading-shimmer"/> : value}
      </div>
      <div className="gauge-bar-track">
        <div className="gauge-bar-fill" style={{width:`${Math.min(pct||0,100)}%`,background:`linear-gradient(90deg,${color},${barColor})`}}/>
      </div>
      {labels&&<div className="gauge-labels">{labels.map((l,i)=><span key={i}>{l}</span>)}</div>}
      <div className="gauge-desc">{desc}</div>
    </div>
  );
}

function TrifectaPanel() {
  const t = TRIFECTA;
  const sc = t.score/t.max;
  const color = sc>=0.67?"#22c55e":sc>=0.44?"#f59e0b":"#ef4444";
  const sigColor = {bullish:"#22c55e",bearish:"#ef4444",neutral:"#f59e0b"};
  return (
    <div className="trifecta-wrap">
      <div className="trifecta-score-box">
        <div className="trifecta-score-label">Trifecta Lens Score</div>
        <div className="trifecta-score-number" style={{color}}>
          {t.score}<span className="trifecta-score-max">/{t.max}</span>
        </div>
        <div className="trifecta-verdict">{t.verdict}</div>
        <div style={{marginTop:"12px",paddingTop:"10px",borderTop:"1px solid var(--border)"}}>
          <div className="trifecta-score-label" style={{marginBottom:"4px"}}>SQN Regime</div>
          <div style={{fontFamily:"var(--display)",fontSize:"18px",letterSpacing:"2px",color:t.regimeColor}}>{t.regime}</div>
        </div>
        <div style={{marginTop:"10px",fontSize:"9px",color:"var(--muted)",fontFamily:"var(--serif)",fontStyle:"italic"}}>Update score manually after weekly Trifecta review</div>
      </div>
      <div className="trifecta-pillars">
        {t.pillars.map((p,i) => (
          <div className="pillar-card" key={i}>

              <span>{p.icon}</span>{p.name}
              <span style={{marginLeft:"auto",fontFamily:"var(--display)",fontSize:"22px"}}>{p.score}/{p.max}</span>

              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

// ██  TSMCRevenueChart (unchanged)  ██
// ═══════════════════════════════════════════════════════════════════════════════
function TSMCRevenueChart() {
  const [tooltip, setTooltip] = useState(null);
  const ltm = TSMC_MONTHLY_REV.slice(-12).reduce((s,d)=>s+d.usdB,0);
  const latest = TSMC_MONTHLY_REV[TSMC_MONTHLY_REV.length-1];
  const W = 860, H = 240;
  const marginL = 52, marginR = 12, marginT = 24, marginB = 56;
  const chartW = W - marginL - marginR;
  const chartH = H - marginT - marginB;
  const maxVal = Math.ceil(Math.max(...TSMC_MONTHLY_REV.map(d=>d.twdB)) / 50) * 50;
  const n = TSMC_MONTHLY_REV.length;
  const barW = (chartW / n) * 0.72;
  const gap = chartW / n;
  const yTicks = [];
  for (let v = 0; v <= maxVal; v += 100) yTicks.push(v);
  const yScale = v => chartH - (v / maxVal) * chartH;
  const xCenter = i => marginL + i * gap + gap / 2;
  const barColor = era => era==="2026" ? ["rgba(250,204,21,0.8)","rgba(250,204,21,0.4)"] :
                          era==="2025" ? ["rgba(34,211,238,0.75)","rgba(34,211,238,0.35)"] :
                                         ["rgba(59,130,246,0.7)","rgba(59,130,246,0.35)"];
  const showLabel = i => i % 3 === 0 || i === n - 1;
  return (
    <div className="rev-chart-wrap">
      <div className="rev-chart-header">
        <div>
          <div className="rev-chart-title">TSMC MONTHLY REVENUE TRACKER</div>
          <div className="rev-chart-sub">NT$ Billions — publicly reported by TSMC IR (~10th of each month) · <span style={{color:"var(--amber)"}}>Manual update required</span></div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:"9px",letterSpacing:"1.5px",color:"var(--text-dim)",textTransform:"uppercase",marginBottom:"4px"}}>LTM Revenue (USD)</div>
          <div style={{fontFamily:"var(--display)",fontSize:"22px",color:"var(--cyan)"}}>${ltm.toFixed(1)}B</div>
          <div style={{fontSize:"9px",color:"var(--text-dim)",marginTop:"2px"}}>Last 12 months</div>
        </div>
      </div>
      <div className="rev-svg-wrap">
        <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
          <defs><clipPath id="chartClip"><rect x={marginL} y={marginT} width={chartW} height={chartH}/></clipPath></defs>
          {yTicks.map(v => {
            const y = marginT + yScale(v);
            return (
              <g key={v}>
                <line x1={marginL} x2={marginL+chartW} y1={y} y2={y} stroke={v===0?"#2a3a58":"#1e2a42"} strokeWidth={v===0?1.5:1} strokeDasharray={v===0?"":"4 4"}/>
                <text x={marginL-6} y={y+4} textAnchor="end" fill="#8896b3" fontSize="10" fontFamily="'Share Tech Mono',monospace">{v}</text>
              </g>
            );
          })}
          <text x={10} y={marginT + chartH/2} textAnchor="middle" fill="#4a5568" fontSize="9" fontFamily="'Share Tech Mono',monospace" transform={`rotate(-90, 10, ${marginT + chartH/2})`}>NT$ BILLIONS</text>
          {["2024","2025","2026"].map(yr => {
            const firstIdx = TSMC_MONTHLY_REV.findIndex(d=>d.era===yr);
            if (firstIdx < 0) return null;
            const x = xCenter(firstIdx) - gap/2;
            const lastIdx = TSMC_MONTHLY_REV.reduce((acc,d,i)=>d.era===yr?i:acc,-1);
            const midX = (xCenter(firstIdx) + xCenter(lastIdx)) / 2;
            const col = yr==="2026"?"rgba(250,204,21,0.5)":yr==="2025"?"rgba(34,211,238,0.4)":"rgba(59,130,246,0.4)";
            return (
              <g key={yr}>
                {firstIdx > 0 && <line x1={x} x2={x} y1={marginT} y2={marginT+chartH+2} stroke="#2a3a58" strokeWidth="1.5" strokeDasharray="3 3"/>}
                <text x={midX} y={marginT+chartH+46} textAnchor="middle" fill={col} fontSize="11" fontFamily="'Bebas Neue',sans-serif" letterSpacing="2">{yr}</text>
              </g>
            );
          })}
          {TSMC_MONTHLY_REV.map((d,i) => {
            const bh = Math.max(3, (d.twdB/maxVal)*chartH);
            const bx = xCenter(i) - barW/2;
            const by = marginT + chartH - bh;
            const [fill, stroke] = barColor(d.era);
            const yoyUp = d.yoy.startsWith("+");
            return (
              <g key={i} onMouseEnter={() => setTooltip({i, x: xCenter(i), y: by, d})} onMouseLeave={() => setTooltip(null)} style={{cursor:"pointer"}}>
                <rect x={bx} y={by} width={barW} height={bh} fill={fill} stroke={stroke} strokeWidth="1" rx="2"/>
                <text x={xCenter(i)} y={by - 4} textAnchor="middle" fill={yoyUp?"#22c55e":"#ef4444"} fontSize="8" fontFamily="'Share Tech Mono',monospace">{d.yoy}</text>
              </g>
            );
          })}
          {TSMC_MONTHLY_REV.map((d,i) => showLabel(i) && (
            <text key={i} x={xCenter(i)} y={marginT+chartH+14} textAnchor="middle" fill="#8896b3" fontSize="9" fontFamily="'Share Tech Mono',monospace">{d.month}</text>
          ))}
          {tooltip && (() => {
            const {x, y, d} = tooltip;
            const tx = Math.min(x, W - 130);
            const ty = Math.max(marginT + 4, y - 68);
            return (
              <g>
                <rect x={tx-4} y={ty-2} width={136} height={62} rx="4" fill="#0d1120" stroke="#1e2a42" strokeWidth="1"/>
                <text x={tx+2} y={ty+13} fill="#e2e8f0" fontSize="11" fontFamily="'Bebas Neue',sans-serif" letterSpacing="1">{d.month}</text>
                <text x={tx+2} y={ty+27} fill="#8896b3" fontSize="9" fontFamily="'Share Tech Mono',monospace">NT$ {d.twdB}B</text>
                <text x={tx+2} y={ty+40} fill="#22d3ee" fontSize="9" fontFamily="'Share Tech Mono',monospace">USD ${d.usdB}B</text>
                <text x={tx+2} y={ty+53} fill={d.yoy.startsWith("+")?"#22c55e":"#ef4444"} fontSize="9" fontFamily="'Share Tech Mono',monospace">YoY {d.yoy}</text>
              </g>
            );
          })()}
        </svg>
      </div>
      <div className="rev-footer">
        <span style={{fontSize:"10px",color:"var(--text-dim)"}}><span className="rev-legend-dot" style={{background:"rgba(59,130,246,0.7)"}}/>2024 Actuals</span>
        <span style={{fontSize:"10px",color:"var(--text-dim)"}}><span className="rev-legend-dot" style={{background:"rgba(34,211,238,0.75)"}}/>2025 Actuals</span>
        <span style={{fontSize:"10px",color:"var(--text-dim)"}}><span className="rev-legend-dot" style={{background:"rgba(250,204,21,0.8)"}}/>2026 Reported</span>
        <span style={{marginLeft:"auto",fontSize:"10px"}}>
          Latest ({latest.month}): <span style={{color:"var(--cyan)"}}>NT${latest.twdB}B / ${latest.usdB}B USD</span>
          <span style={{color:"#22c55e",marginLeft:"8px"}}>{latest.yoy} YoY</span>
        </span>
      </div>
    </div>
  );
}

  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// ██  MAIN APP  ██
// ═══════════════════════════════════════════════════════════════════════════════
function TradingDashboard() {
  const [tab, setTab] = useState("liquidity");
  const [stock, setStock] = useState("TSM");
  const [now, setNow] = useState(new Date());

  // Live data state
  const [liveData, setLiveData] = useState({});           // key → { display, change, signal, sparkData, latestDate }
  const [loadingKeys, setLoadingKeys] = useState(new Set());
  const [errorKeys, setErrorKeys] = useState(new Set());
  const [lastFetched, setLastFetched] = useState(null);
  const [keysReady, setKeysReady] = useState(
    FRED_API_KEY !== "YOUR_FRED_API_KEY_HERE"
  );
  const [runtimeFredKey, setRuntimeFredKey] = useState(FRED_API_KEY);

  useEffect(() => { const t = setInterval(()=>setNow(new Date()),60000); return ()=>clearInterval(t); },[]);

  const fmt  = d => d.toLocaleDateString("en-US",{weekday:"short",year:"numeric",month:"short",day:"numeric"});
  const fmtT = d => d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});

  // ── Fetch all FRED series ─────────────────────────────────────────────────
  const fetchAllLive = useCallback(async (fredKey) => {
    const allKeys = Object.keys(FRED_SERIES);
    setLoadingKeys(new Set(allKeys));
    setErrorKeys(new Set());

    // Fire all FRED fetches concurrently
    const results = await Promise.allSettled(
      Object.entries(FRED_SERIES).map(async ([key, spec]) => {
        try {
          const obs = await fetchFredSeries(spec.id, 104);
          const built = buildDisplayValue(key, obs);
          return { key, built };
        } catch(e) {
          return { key, error: e.message };
        }
      })
    );

    const newLive = { ...liveData };
    const newErrors = new Set();
    results.forEach(r => {
      if (r.status === "fulfilled") {
        const { key, built, error } = r.value;
        if (error) newErrors.add(key);
        else newLive[key] = built;
      }
    });
    setLiveData(newLive);
    setErrorKeys(newErrors);
    setLoadingKeys(new Set());
    setLastFetched(new Date());
  }, []);

  const handleKeysSubmit = (fredKey) => {
    window._FRED_KEY = fredKey;
    setRuntimeFredKey(fredKey);
    setKeysReady(true);
    fetchAllLive(fredKey);
  };

  useEffect(() => {
    if (keysReady && runtimeFredKey !== "YOUR_FRED_API_KEY_HERE") {
      window._FRED_KEY = runtimeFredKey;
      fetchAllLive(runtimeFredKey);
    }
  }, []);

  // ── Helpers ────────────────────────────────────────────────────────────────
  const isLoading = key => loadingKeys.has(key);
  const hasError  = key => errorKeys.has(key);
  const getLive   = key => liveData[key] || null;

  function buildCard(key, tabName) {
    const meta = CARD_META[key];
    const live = getLive(key);
    const loading = isLoading(key) && keysReady;
    const err = hasError(key);
    const fallbackSpark = STATIC_SPARK[key];

    return {
      ...meta,
      value:       live ? live.display : (loading ? "…" : "—"),
      change:      live ? live.change  : null,
      signal:      live ? live.signal  : "neutral",
      sparkData:   live ? live.sparkData : fallbackSpark,
      isLive:      true,
      isLoading:   loading,
      liveError:   err,
    };
  }

  // Compute live SPX % above 200-day (approximation: compare SPX to 200-obs avg)
  const spxLive = getLive("SPX");
  let spxAbove200pct = 68; // fallback
  if (spxLive && spxLive.sparkData && spxLive.sparkData.length >= 10) {
    // We can't get % of stocks above MA from FRED (that's a breadth indicator)
    // So we use VIX-derived gauge + keep SPX breadth manual
    spxAbove200pct = 68;
  }

  const vixLive = getLive("VIX");
  const vixVal  = vixLive ? parseFloat(vixLive.display) : 14.2;
  const vixPct  = vixVal > 40 ? 100 : vixVal > 25 ? 75 : vixVal > 15 ? 40 : 15;

  // ── Derived status summary ─────────────────────────────────────────────────
  const liveCount  = Object.keys(liveData).length;
  const totalLive  = Object.keys(FRED_SERIES).length;
  const isFetching = loadingKeys.size > 0;

  const sd = STOCK_DATA[stock];

  const tabs = [
    {id:"liquidity",   icon:"◈", label:"Liquidity"},
    {id:"macro",       icon:"◉", label:"Macro / Leading"},
    {id:"technicals",  icon:"▲", label:"Technical Analysis"},
    {id:"stocks",      icon:"◎", label:"Stock Indicators"},
  ];

  const dotClass = isFetching ? "fetching" : errorKeys.size > 0 ? "error" : liveCount > 0 ? "" : "";

  return (
    <>
      <style>{styles}</style>
      <div className="dashboard">

        {/* ── Header ── */}
        <div className="header">
          <div className="header-left">
            <div className="header-title">MACROSCOPE</div>
            <div className="header-sub">Institutional Indicators Dashboard — Live Data Edition</div>
          </div>
          <div className="header-time">
            <div><span className={`live-dot ${dotClass}`}/>{fmt(now)}</div>
            <div style={{color:"var(--text-dim)"}}>
              {lastFetched ? `Data fetched ${fmtT(lastFetched)}` : `Updated ${fmtT(now)}`}
            </div>
            <div style={{fontSize:"9px",marginTop:"2px",color:liveCount>0?"var(--green)":"var(--muted)"}}>
              {liveCount>0 ? `${liveCount}/${totalLive} LIVE INDICATORS` : "PASTE API KEYS BELOW TO ACTIVATE"}
            </div>
          </div>
        </div>

        {/* ── API Setup Banner (shown if keys not hardcoded) ── */}
        {(!keysReady || (runtimeFredKey === "YOUR_FRED_API_KEY_HERE")) && (
          <SetupBanner onKeysSubmit={handleKeysSubmit}/>
        )}

        {/* ── Status Bar ── */}
        {keysReady && (
          <div className="status-bar">
            <div className={`status-chip ${isFetching?"loading":liveCount>0?"live":"error"}`}>
              <div className="status-dot"/>
              {isFetching ? `Fetching… ${liveCount}/${totalLive}` : `FRED: ${liveCount} series live`}
            </div>
            <div className="status-chip manual">
              <div className="status-dot"/>
              ISM, AAII, NAAIM, Put/Call, McClellan, TSMC: manual
            </div>
            {errorKeys.size > 0 && (
              <div className="status-chip error">
                <div className="status-dot"/>
                {errorKeys.size} fetch error{errorKeys.size > 1 ? "s" : ""}
              </div>
            )}
            {lastFetched && (
              <div className="status-refresh" onClick={()=>fetchAllLive(runtimeFredKey)}>
                ↻ Refresh
              </div>
            )}
          </div>
        )}

        {/* ── Tabs ── */}
        <div className="tabs">
          {tabs.map(t=>(
            <div key={t.id} className={`tab ${tab===t.id?"active":""}`} onClick={()=>setTab(t.id)}>
              <span>{t.icon}</span>{t.label}
            </div>
          ))}
        </div>

        {/* ══════════════════ LIQUIDITY TAB ══════════════════ */}
        {tab==="liquidity"&&(
          <>
            <div className="section-header">
              <div className="section-title">Liquidity Monitor</div>
              <div className="section-desc">Druckenmiller Framework — Central Bank &amp; Credit Conditions</div>
            </div>
            <div className="framework-banner">
              "Earnings don't move the overall market — it's the Federal Reserve Board. The key is to watch the central banks and the movement of liquidity. Most people in the market are looking at earnings. I'm focused on what's going to happen 12 to 18 months out."
              <div className="framework-attr">— STANLEY DRUCKENMILLER</div>
            </div>
            <div className="grid" style={{marginTop:"4px"}}>
              {["FED_BALANCE","RRP","TGA","M2_YOY","NFCI","HY_SPREADS","DXY","CI_LOANS","SOFR"].map(key=>(
                <MetricCard key={key} {...buildCard(key,"liquidity")}/>
              ))}
              {MANUAL_INDICATORS.liquidity.map((ind,i)=>(
                <MetricCard key={`manual_${i}`} {...ind} isLive={false}/>
              ))}
            </div>
          </>
        )}

        {/* ══════════════════ MACRO TAB ══════════════════ */}
        {tab==="macro"&&(
          <>
            <div className="section-header">
              <div className="section-title">Economic Leading Indicators</div>
              <div className="section-desc">Real economy signals — consumption, credit, industrial activity, sentiment</div>
            </div>
            <div className="grid">
              {["YIELD_CURVE","JOBLESS","NAHB","MICH"].map(key=>(
                <MetricCard key={key} {...buildCard(key,"macro")}/>
              ))}
              {MANUAL_INDICATORS.macro.map((ind,i)=>(
                <MetricCard key={`macro_manual_${i}`} {...ind} isLive={false}/>
              ))}
            </div>
          </>
        )}

        {/* ══════════════════ TECHNICALS TAB ══════════════════ */}
        {tab==="technicals"&&(
          <>
            <div className="section-header">
              <div className="section-title">Technical Analysis</div>
              <div className="section-desc">Macro Ops Trifecta Framework + Legendary Trader Indicators</div>
            </div>
            <div className="framework-banner">
              "The best trades are the ones in which you have all three things going for you: fundamentals, technical, and market tone."
              <div className="framework-attr">— MICHAEL MARCUS / MACRO OPS TRIFECTA APPROACH</div>
            </div>
            <TrifectaPanel/>
            <div className="subsection-label" style={{color:"var(--blue)",marginTop:"16px"}}>◈ BREADTH, INTERNALS &amp; SENTIMENT GAUGES</div>
            <div className="tech-gauges">
              {/* % Above 200d SMA — manual */}
              <GaugeCard title="% S&P 500 Stocks Above 200-Day SMA" value="68%" pct={68} color="#22c55e"
                labels={["Bear <30%","Neutral 30–50%","Bull 50–70%","Ext >70%"]}
                desc="Broad market participation — 68% of S&P 500 components in long-term uptrends. Above 70% = extended. Below 40% = washout buying zone." isLive={false}/>
              {/* % Above 50d SMA — manual */}
              <GaugeCard title="% S&P 500 Stocks Above 50-Day SMA" value="72%" pct={72} color="#3b82f6"
                labels={["OS <20%","Neutral 30–60%","Strong 60–75%","OB >80%"]}
                desc="Short-term breadth. At 72%, broad backing. Watch for divergence vs. index as an early warning of a narrow market." isLive={false}/>
              {/* VIX — LIVE from FRED */}
              <GaugeCard
                title="VIX — CBOE Volatility Index"
                value={vixLive ? vixLive.display : "14.2"}
                pct={vixPct}
                color="#22c55e"
                labels={["Panic >40","Elevated 25–40","Normal 15–25","Complacency <15"]}
                desc="Fear gauge. Druckenmiller watches VIX regime shifts closely. A sudden spike from low VIX often signals regime change."
                isLive={true}
                isLoading={isLoading("VIX")}/>
              {/* Put/Call — manual */}
              <GaugeCard {...MANUAL_INDICATORS.technicals.putcall} isLive={false}/>
              {/* AAII — manual */}
              <GaugeCard {...MANUAL_INDICATORS.technicals.aaii} isLive={false}/>
              {/* NAAIM — manual (institutional paywall on Nasdaq Data Link) */}
              <GaugeCard {...MANUAL_INDICATORS.technicals.naaim} isLive={false}/>
              {/* McClellan — manual */}
              <GaugeCard {...MANUAL_INDICATORS.technicals.mcclellan} isLive={false}/>
              {/* NYSE A/D — manual */}
              <GaugeCard {...MANUAL_INDICATORS.technicals.nyad} isLive={false}/>
            </div>

            <div className="legend-header">
              <div className="legend-title">◉ LEGENDARY TRADER INDICATORS</div>
              <div className="legend-sub">Druckenmiller · Livermore · Kovner · Marcus — signals these traders have publicly described and used</div>
            </div>
            <div className="grid grid-wide">
              {/* SPX 200-day MA — live from FRED */}
              {(() => {
                const spxCard = buildCard("SPX","technicals");
                return (
                  <MetricCard
                    name="SPX Level (vs. 200-Day MA — Druckenmiller)"
                    value={spxCard.value}
                    signal={spxCard.signal}
                    change={spxCard.change}
                    changePeriod="vs. prev"
                    sparkData={spxCard.sparkData}
                    desc="Druckenmiller's primary long-term trend filter. He refuses to hold meaningful long exposure when SPX is below its 200-day. Watch the live value vs. 200-day MA."
                    source="FRED: SP500 (daily)"
                    isLive={true}
                    isLoading={isLoading("SPX")}/>
                );
              })()}
              {/* Moody's Baa — live from FRED */}
              {(() => {
                const baaCard = buildCard("MOODY_BAA","technicals");
                return (
                  <MetricCard
                    name="Moody's Baa Yield — Macro Ops / Druck"
                    value={baaCard.value}
                    signal={baaCard.signal}
                    change={baaCard.change}
                    changePeriod="WoW"
                    sparkData={baaCard.sparkData}
                    desc="Macro Ops monitors 26-week % change in Moody's Baa yields. When yields rise fast and cross the upper threshold, equity selloff typically follows within weeks."
                    source="FRED: BAA (Moody's via FRED)"
                    isLive={true}
                    isLoading={isLoading("MOODY_BAA")}/>
                );
              })()}
              {MANUAL_INDICATORS.legend.map((ind,i)=>(
                <MetricCard key={`legend_${i}`} {...ind} isLive={false}/>
              ))}
            </div>
          </>
        )}

        {/* ══════════════════ STOCKS TAB ══════════════════ */}
        {tab==="stocks"&&(
          <>
            <div className="section-header">
              <div className="section-title">Stock-Specific Indicators</div>
              <div className="section-desc">Leading indicators for core holdings — supply chain, demand signals, competitive positioning</div>
            </div>
            <div style={{padding:"12px 28px 0",display:"flex",gap:"10px"}}>
              {Object.keys(STOCK_DATA).map(t=>(
                <div key={t} onClick={()=>setStock(t)}
                  style={{
                    padding:"8px 20px",cursor:"pointer",borderRadius:"4px",
                    fontFamily:"var(--display)",fontSize:"16px",letterSpacing:"3px",
                    transition:"all 0.2s",
                    border:`1px solid ${stock===t?STOCK_DATA[t].color:"var(--border)"}`,
                    background:stock===t?`rgba(${t==="TSM"?"59,130,246":t==="GOOGL"?"34,197,94":"245,158,11"},0.1)`:"transparent",
                    color:stock===t?STOCK_DATA[t].color:"var(--text-dim)"
                  }}>
                  {t}
                </div>
              ))}
            </div>
            <div className="overview-grid">
              <div className="overview-card"><div className="overview-label">Price</div><div style={{color:sd.color,fontSize:"26px"}}>{sd.price}</div></div>
              <div className="overview-card"><div className="overview-label">Day Change</div><div style={{color:"#22c55e",fontSize:"26px"}}>{sd.change}</div></div>
              <div className="overview-card"><div className="overview-label">Bull Indicators</div><div style={{color:"var(--gold)",fontSize:"26px"}}>{sd.indicators.filter(x=>x.signal==="bullish").length}<span style={{fontSize:"14px",color:"var(--text-dim)"}}> / {sd.indicators.length}</span></div></div>
            </div>
            <div className="stock-thesis">{sd.thesis}</div>
            {stock==="TSM"&&<TSMCRevenueChart/>}
            <div className="grid grid-wide" style={{marginTop:"8px"}}>
              {sd.indicators.map((ind,i)=><MetricCard key={i} {...ind} isLive={false}/>)}
            </div>
          </>
        )}

        <div className="disclaimer">
          ⚠ LIVE FRED data (Fed Balance Sheet, RRP, TGA, M2, NFCI, HY Spreads, DXY, C&I Loans, SOFR, Yield Curve, Jobless Claims, Housing Starts, Michigan Sentiment, VIX, Moody's Baa, S&P 500) sourced directly from the St. Louis Fed FRED API.
          All other indicators (ISM, AAII, NAAIM, Put/Call, McClellan, NYSE A/D, TSMC revenue, stock data) are hardcoded and require manual weekly update. NAAIM is institutional-only on Nasdaq Data Link — update manually each Thursday from naaim.org.
          TSMC revenue: update ~10th of each month from investor.tsmc.com/english/ir/monthly-sales. Nothing herein constitutes investment advice.
        </div>
      </div>
    </>
  );
}



const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<TradingDashboard/>);
</script>
</body>
</html>
